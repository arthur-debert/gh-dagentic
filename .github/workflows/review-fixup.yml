# The relay stage (pull_request_review -> workflow_dispatch) must live in the
# consumer repo because it needs the pull_request_review trigger.
# This reusable workflow handles only the fixup stage.

name: "[Dagentic] Review Fixup"

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      head_ref:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  fixup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_ref }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "github-actions"
          prompt: |
            Read all unresolved review comments on PR #${{ inputs.pr_number }}.
            For each comment: implement the suggested fix, OR reply explaining why you are
            not implementing it (be specific, not dismissive).
            Push your changes. Update labels per CLAUDE.md conventions.
            As the very last line of your comment, add a metadata line in exactly this format (it will be hidden in the GitHub UI):
            <!-- dagentic:phase=review-fixup tokens_in=INPUT_TOKENS tokens_out=OUTPUT_TOKENS model=MODEL_USED -->
          claude_args: --model claude-sonnet-4-6 --max-turns 20 --allowedTools Bash,Read,Write,Edit,Glob,Grep
