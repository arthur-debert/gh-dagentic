name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            gh_platform: linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            gh_platform: linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            gh_platform: darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            gh_platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gh-dagentic dist/gh-dagentic-${{ matrix.gh_platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: gh-dagentic-${{ matrix.gh_platform }}
          path: dist/gh-dagentic-${{ matrix.gh_platform }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            gh-dagentic-*
