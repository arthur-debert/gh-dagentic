# Installed by gh-dagentic into .github/workflows/side-agent-review.yml

name: "[Dagentic] Side Agent Review"

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  request-review:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'pr: review-pending')
    permissions:
      pull-requests: write
    uses: arthur-debert/gh-dagentic/.github/workflows/side-agent-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
